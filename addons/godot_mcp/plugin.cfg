[plugin]

name="Godot MCP Bridge"
description="Connects a Godot 4 (.NET) project to a local FastMCP server over WebSocket, so an AI agent can inspect and drive the editor and the running game. Generic and project-agnostic: exposes node/tree/scene/shader/tween/runtime primitives. Other addons can contribute their own commands via McpCommandRegistry."
author="The Tech Idea"
version="0.2.0"
script="GodotMcpPlugin.cs"
